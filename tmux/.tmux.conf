# Plu
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g status-interval 2
set -g status-right "#S #[bg=#202020,fg=#656A6A]#(tmux-mem-cpu-load --interval 2)#[default]"

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g status-style 'bg=#202020 fg=#656A6A'
set-window-option -g window-status-current-style 'bg=#656A6A fg=#202020'
set -s escape-time 0

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Use Alt-arrow keys to switch panes
bind -r h select-pane -L
bind -r l select-pane -R
bind -r k select-pane -U
bind -r j select-pane -D

# Use Shift keys to switch between windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Mouse mode
setw -g mouse on

# Set easier window split keys
# bind-key v split-window -h
# bind-key h split-window -v

set -g default-terminal "xterm-256color"

# Easy config reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# sessions
bind -r i run-shell "tmux neww $DEV_FILES/cht/cht.sh"

bind-key -r C run-shell "$DEV_FILES/tmux/session ~/code"
bind-key -r W run-shell "$DEV_FILES/tmux/session ~/workspace"
bind-key -r D run-shell "$DEV_FILES/tmux/session ~/.dotfiles"

# bind-key -r S run-shell "~/development/dotfiles/tmux/session ~/development/work"

