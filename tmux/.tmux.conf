set -g buffer-limit 20
set -g default-terminal "tmux-256color"
set -g display-time 1500
set -g history-limit 50000
set -g remain-on-exit off
set -g repeat-time 300
set -g set-titles on
set -g set-titles-string "#T"
set -g status-interval 0
set -sg escape-time 0
setw -g aggressive-resize on
setw -g allow-rename off
setw -g automatic-rename off
setw -g mode-keys vi
setw -g mouse on

# Plugins
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/block/gray'

set -ga terminal-overrides ',xft:ligatures=yes'
# action key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Edit configuration and reload
bind e new-window -n 'tmux.conf' "sh -c '\${EDITOR:-nvim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"

# Reload tmux configuration 
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# macOS only
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow, 
# once you release left click yellow text will disappear and will automatically be available in clibboard
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Open current directory
bind O run-shell "open #{pane_current_path}"

# Rename session and window
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind S command-prompt -I "#{session_name}" "rename-session '%%'"
bind V split-window -v 
bind H split-window -h

# look'n feel
set-option -g status-fg cyan
set-option -g status-bg black
set -g status-interval 2
set -g status-right "#S #[bg=#202020,fg=#656A6A]#(tmux-mem-cpu-load --interval 2)#[default]"
set -g pane-active-border-style fg=colour166,bg=default
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default

# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136,default

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour136,bg=colour235

# message text
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# # Use Alt-arrow keys to switch panes
bind -r h select-pane -L
bind -r l select-pane -R
bind -r k select-pane -U
bind -r j select-pane -D

# # Kill session and jump to the next
bind-key X confirm-before -p "Kill #S (y/n)?" "run-shell 'tmux switch-client -n \\\; kill-session -t \"#S\"'"

# sessions
bind-key -r i run-shell "tmux neww ~/.local/bin/cht"
bind-key -r o run-shell "tmux neww ~/.local/bin/ss"
bind-key -r D run-shell "~/.local/bin/ss ~/Developer"

# Theme
set-option -g status-bg colour235 #base02

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
