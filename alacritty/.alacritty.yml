live_config_reload: true
env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 100
    lines: 26
  decorations: buttonless
  startup_mode: Windowed
  padding:
    x: 5
    y: 5
font:
  normal:
    family: "FiraCode Nerd Font Mono"
    style: Regular
    ligatures: true
  bold:
    family: "FiraCode Nerd Font Mono"
    style: Bold
  italic:
    family: "FiraCode Nerd Font Mono"
    style: Italic
  size: 14.0
bell:
  animation: EaseOutQuint
  duration: 10
debug:
  render_timer: false
  persistent_logging: false
  log_level: Warn
  print_events: false
alt_send_esc: false
key_bindings:
  - {
      key: N,
      mods: Command|Shift,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "new-session", "-d" ]
        }
    }
  - {
      key: T,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "new-window" ]
        }
    }
  - { key: V, mods: Command, action: Paste }
  - { key: C, mods: Command, action: Copy }
  - { key: W, mods: Command, action: Quit }
  - {
      key: Q,
      mods: Alt|Shift,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "kill-window" ]
        }
    }
  - {
      key: Q,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "kill-pane" ]
        }
    }
  - {
      key: S,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "split-window", "-h" ]
        }
    }
  - {
      key: B,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "split-window", "-b" ]
        }
    }
  - {
      key: Key1,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "1" ]
        }
    }
  - {
      key: Key2,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "2" ]
        }
    }
  - {
      key: Key3,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "3" ]
        }
    }
  - {
      key: Key4,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "4" ]
        }
    }
  - {
      key: Key5,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "5" ]
        }
    }
  - {
      key: Key6,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "6" ]
        }
    }
  - {
      key: Key7,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "7" ]
        }
    }
  - {
      key: Key8,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "8" ]
        }
    }
  - {
      key: Key9,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "9" ]
        }
    }
  - { key: Delete, chars: "\e[3~" }
  - { key: Key1, mods: Alt, chars: "©" }
  - { key: Key2, mods: Alt, chars: "@" }
  - { key: Key3, mods: Alt, chars: "£" }
  - { key: Key4, mods: Alt, chars: "$" }
  - { key: Key5, mods: Alt, chars: "∞" }
  - { key: Key6, mods: Alt, chars: "§" }
  - { key: Key7, mods: Alt, chars: "|" }
  - { key: Key8, mods: Alt, chars: "[" }
  - { key: Key9, mods: Alt, chars: "]" }
  - { key: Key0, mods: Alt, chars: "≈" }
  - { key: Grave, mods: Alt, chars: "~" }
  - { key: Equals, mods: Command, action: IncreaseFontSize }
  - { key: Key0, mods: Command, action: ResetFontSize }
  - { key: Equals, mods: Command, action: IncreaseFontSize }
  - { key: Minus, mods: Command, action: DecreaseFontSize }
  - { key: Left, mods: Alt, chars: "\eb" }
  - { key: Right, mods: Alt, chars: "\ef" }
  - {
      key: Left,
      mods: Command,
      chars: "\eOH",
      mode: AppCursor
    }
  # Home
  - {
      key: Right,
      mods: Command,
      chars: "\eOF",
      mode: AppCursor
    }
  # End

# Colors (Gruvbox Material Dark Medium)
colors:
  # Default colors
  primary:
    background: '#1d1f21'
    foreground: '#c5c8c6'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '#1d1f21'
    cursor: '#ffffff'

  # Normal colors
  normal:
    black: '#1d1f21'
    red: '#cc6666'
    green: '#b5bd68'
    yellow: '#e6c547'
    blue: '#81a2be'
    magenta: '#b294bb'
    cyan: '#70c0ba'
    white: '#373b41'

  # Bright colors
  bright:
    black: '#666666'
    red: '#ff3334'
    green: '#9ec400'
    yellow: '#f0c674'
    blue: '#81a2be'
    magenta: '#b77ee0'
    cyan: '#54ced6'
    white: '#282a2e'
theme: Tomorrow-Night
