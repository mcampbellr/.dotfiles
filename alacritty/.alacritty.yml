alt_send_esc: false
bell:
  animation: EaseOutQuint
  duration: 10
colors:
  # Default colors
  bright:
    black: "#928374"
    blue: "#83a598"
    cyan: "#8ec07c"
    green: "#b8bb26"
    magenta: "#d3869b"
    red: "#fb4934"
    white: "#ebdbb2"
    yellow: "#fabd2f"
  # Normal colors
  normal:
    black: "#282828"
    blue: "#458588"
    cyan: "#689d6a"
    green: "#98971a"
    magenta: "#b16286"
    red: "#cc241d"
    white: "#a89984"
    yellow: "#d79921"

  # Bright colors
  primary:
    # hard contrast: background = '#1d2021'
    background: "#2B2B2B"
    # soft contrast: background = '#32302f'
    foreground: "#ebdbb2"
debug:
  log_level: Warn
  persistent_logging: false
  print_events: false
  render_timer: false
env:
  TERM: alacritty
font:
  bold:
    family: "FiraCode Nerd Font Mono"
    style: Bold
  italic:
    family: "FiraCode Nerd Font Mono"
    style: Italic
  normal:
    family: "FiraCode Nerd Font Mono"
    style: Retina
  size: 14.0
live_config_reload: true
# Colors (Gruvbox Material Dark Medium)
window:
  dynamic_padding: true
  startup_mode: Maximized
