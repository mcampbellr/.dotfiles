live_config_reload: true
env:
  TERM: alacritty
window:
  opacity: 0.95
  startup_mode: Windowed
font:
  normal:
    family: "CaskaydiaCove Nerd Font"
    style: Light
  bold:
    family: "CaskaydiaCove Nerd Font"
    style: Bold
  italic:
    family: "CaskaydiaCove Nerd Font"
    style: Italic
  size: 14.0
bell:
  animation: EaseOutQuint
  duration: 10
debug:
  render_timer: false
  persistent_logging: false
  log_level: Warn
  print_events: false
alt_send_esc: false
key_bindings:
  - {
      key: N,
      mods: Command|Shift,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "new-session", "-d" ]
        }
    }
  - {
      key: T,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "new-window" ]
        }
    }
  - { key: V, mods: Command, action: Paste }
  - { key: C, mods: Command, action: Copy }
  - { key: W, mods: Command, action: Quit }
  - {
      key: Q,
      mods: Alt|Shift,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "kill-window" ]
        }
    }
  - {
      key: Q,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "kill-pane" ]
        }
    }
  - {
      key: S,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "split-window", "-h" ]
        }
    }
  - {
      key: B,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "split-window", "-b" ]
        }
    }
  - {
      key: Key1,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "1" ]
        }
    }
  - {
      key: Key2,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "2" ]
        }
    }
  - {
      key: Key3,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "3" ]
        }
    }
  - {
      key: Key4,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "4" ]
        }
    }
  - {
      key: Key5,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "5" ]
        }
    }
  - {
      key: Key6,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "6" ]
        }
    }
  - {
      key: Key7,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "7" ]
        }
    }
  - {
      key: Key8,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "8" ]
        }
    }
  - {
      key: Key9,
      mods: Command,
      command:
        {
          program: "/opt/homebrew/bin/tmux",
          args: [ "selected window", "-t", "9" ]
        }
    }
  - { key: Delete, chars: "\e[3~" }
  - { key: Key1, mods: Alt, chars: "©" }
  - { key: Key2, mods: Alt, chars: "@" }
  - { key: Key3, mods: Alt, chars: "£" }
  - { key: Key4, mods: Alt, chars: "$" }
  - { key: Key5, mods: Alt, chars: "∞" }
  - { key: Key6, mods: Alt, chars: "§" }
  - { key: Key7, mods: Alt, chars: "|" }
  - { key: Key8, mods: Alt, chars: "[" }
  - { key: Key9, mods: Alt, chars: "]" }
  - { key: Key0, mods: Alt, chars: "≈" }
  - { key: Grave, mods: Alt, chars: "~" }
  - { key: Equals, mods: Command, action: IncreaseFontSize }
  - { key: Key0, mods: Command, action: ResetFontSize }
  - { key: Equals, mods: Command, action: IncreaseFontSize }
  - { key: Minus, mods: Command, action: DecreaseFontSize }
  - { key: Left, mods: Alt, chars: "\eb" }
  - { key: Right, mods: Alt, chars: "\ef" }
  - {
      key: Left,
      mods: Command,
      chars: "\eOH",
      mode: AppCursor
    }
  # Home
  - {
      key: Right,
      mods: Command,
      chars: "\eOF",
      mode: AppCursor
    }
  # End

# Colors (Gruvbox Material Dark Medium)
colors:
  # Default colors
  primary:
    background: '#282c34'
    foreground: '#abb2bf'

  # Normal colors
  normal:
    # NOTE: Use '#131613' for the `black` color if you'd like to see
    # black text on the background.
    black: '#282c34'
    red: '#e06c75'
    green: '#98c379'
    yellow: '#d19a66'
    blue: '#61afef'
    magenta: '#c678dd'
    cyan: '#56b6c2'
    white: '#abb2bf'

  # Bright colors
  bright:
    black: '#5c6370'
    red: '#e06c75'
    green: '#98c379'
    yellow: '#d19a66'
    blue: '#61afef'
    magenta: '#c678dd'
    cyan: '#56b6c2'
    white: '#ffffff'
theme: One-Dark
