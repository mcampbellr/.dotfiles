---
live_config_reload: true
env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 100
    lines: 26
  startup_mode: Windowed
  padding:
    x: 5
    y: 3
  opacity: .95
font:
  normal:
    family: FiraCode Nerd Font
    style: Regular
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  size: 14.0
bell:
  animation: EaseOutQuint
  duration: 10
debug:
  render_timer: false
  persistent_logging: false
  log_level: Warn
  print_events: false
alt_send_esc: false
colors:
  # Default colors
  primary:
    background: '#282c34'
    foreground: '#abb2bf'

  # Normal colors
  normal:
    black: '#282c34'
    red: '#e06c75'
    green: '#98c379'
    yellow: '#d19a66'
    blue: '#61afef'
    magenta: '#c678dd'
    cyan: '#56b6c2'
    white: '#abb2bf'

  # Bright colors
  bright:
    black: '#5c6370'
    red: '#e06c75'
    green: '#98c379'
    yellow: '#d19a66'
    blue: '#61afef'
    magenta: '#c678dd'
    cyan: '#56b6c2'
    white: '#ffffff'
theme: One-Dark
