live_config_reload: true
window:
  padding:
    x: 5
    y: 5
  opacity: 1 
  title: mcambpellr
  dynamic_title: true
scrolling:
  history: 10000
font:
  normal:
    family: FiraCode Nerd Font
    style: Light
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  size: 14.0
  use_thin_strokes: true
  builtin_box_drawing: true

# Colors (iTerm 2 default theme)
colors:
 # Default colors
 primary:
   background: '#101421'
   foreground: '#fffbf6'

 # Normal colors
 normal:
   black:   '#2e2e2e'
   red:     '#eb4129'
   green:   '#abe047'
   yellow:  '#f6c744'
   blue:    '#47a0f3'
   magenta: '#7b5cb0'
   cyan:    '#64dbed'
   white:   '#e5e9f0'

 # Bright colors
 bright:
   black:   '#565656'
   red:     '#ec5357'
   green:   '#c0e17d'
   yellow:  '#f9da6a'
   blue:    '#49a4f8'
   magenta: '#a47de9'
   cyan:    '#99faf2'
   white:   '#ffffff'
