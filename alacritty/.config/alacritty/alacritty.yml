---
live_config_reload: true
env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 100
    lines: 26
  startup_mode: Windowed
  padding:
    x: 5
    y: 3
  opacity: 0.97
font:
  normal:
    family: FiraCode Nerd Font
    style: Light
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  size: 13.5
bell:
  animation: EaseOutQuint
  duration: 10
debug:
  render_timer: false
  persistent_logging: false
  log_level: Warn
  print_events: false
alt_send_esc: false
colors:
  name: Atelierdune (dark)
  author: Chris Kempson
  primary:
    background: '#20201d'
    foreground: '#a6a28c'
  cursor:
    text: '#20201d'
    cursor: '#a6a28c'
  normal:
    black: '#20201d'
    red: '#d73737'
    green: '#60ac39'
    yellow: '#cfb017'
    blue: '#6684e1'
    magenta: '#b854d4'
    cyan: '#1fad83'
    white: '#a6a28c'
  bright:
    black: '#7d7a68'
    red: '#d73737'
    green: '#60ac39'
    yellow: '#cfb017'
    blue: '#6684e1'
    magenta: '#b854d4'
    cyan: '#1fad83'
    white: '#fefbec'
theme: Atelierdune.dark
