---
live_config_reload: true
env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 100
    lines: 26
  startup_mode: Windowed
  padding:
    x: 5
    y: 3
  opacity: 0.93
font:
  normal:
    family: FiraCode Nerd Font
    style: Regular
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  size: 14.0
bell:
  animation: EaseOutQuint
  duration: 10
debug:
  render_timer: false
  persistent_logging: false
  log_level: Warn
  print_events: false
alt_send_esc: false
colors:
  name: Numix Darkest
  author: ""
  primary:
    background: "#282828"
    foreground: "#a2a2a2"
  cursor:
    text: "#282828"
    cursor: "#a2a2a2"
  normal:
    black: "#555555"
    red: "#9c3528"
    green: "#61bc3b"
    yellow: "#f3b43a"
    blue: "#0d68a8"
    magenta: "#744560"
    cyan: "#288e9c"
    white: "#a2a2a2"
  bright:
    black: "#888888"
    red: "#d64937"
    green: "#86df5d"
    yellow: "#fdd75a"
    blue: "#0f75bd"
    magenta: "#9e5e83"
    cyan: "#37c3d6"
    white: "#f9f9f9"
theme: NumixDarkest
